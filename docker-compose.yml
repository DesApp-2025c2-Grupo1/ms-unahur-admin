version: "3.8"
services:
  db:
    image: postgres
    container_name: unahur-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mediunahur_db
      POSTGRES_USER: username
      POSTGRES_PASSWORD: altaclave
    volumes:
      - local_pgdata:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    restart: always
    ports:
      - "8888:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: mediunahur@edu.com.ar
      PGADMIN_DEFAULT_PASSWORD: altaclave
    volumes:
      - pgadmin-data:/var/lib/pgadmin

volumes:
  local_pgdata:
  pgadmin-data:
