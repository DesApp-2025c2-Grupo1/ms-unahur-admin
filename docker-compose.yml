version: "3.8"

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:16
    container_name: unahur-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: mediunahur_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - local_pgdata:/var/lib/postgresql/data
    networks:
      - unahur-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mediunahur_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PgAdmin para administrar la BD
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_web
    restart: always
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: pgadminpassword
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - unahur-network

networks:
  unahur-network:
    driver: bridge

volumes:
  local_pgdata:
  pgadmin-data:
