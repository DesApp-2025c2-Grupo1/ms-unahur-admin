name: Node.js CI

on:
  push:
    branches: ["feature/*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3 # Trae el código del repositorio
        with:
          fetch-depth: 0 # Asegura que se obtenga todo el historial de commits
      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test
      - name: Build project
        run: npm run build